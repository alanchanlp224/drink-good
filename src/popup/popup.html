<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drink Good</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <img
          id="brand-icon"
          class="brand-icon"
          width="28"
          height="28"
          alt=""
        />
        <div>
          <h1>Drink Good</h1>
          <p id="version" class="muted">v0.0.1</p>
        </div>
      </div>
      <p class="tagline">Vivino scores on wine shop pages</p>
    </header>

    <div id="update-banner" class="update-banner" hidden>
      <span>Update available</span>
      <a id="update-link" href="#" target="_blank" rel="noopener noreferrer">v0.0.0</a>
    </div>

    <section class="panel">
      <div class="row">
        <span class="label">Status</span>
        <span id="processing-status" class="value value--status">—</span>
      </div>
      <div class="row">
        <span class="label">Site adapter</span>
        <span id="adapter-id" class="value">—</span>
      </div>
      <div class="row">
        <span class="label">Vivino cache</span>
        <span id="cache-size" class="value">—</span>
      </div>
      <div class="row">
        <span class="label">Log lines</span>
        <span id="log-count" class="value">—</span>
      </div>
    </section>

    <details class="debug">
      <summary>Debug tools</summary>
      <div class="debug-actions">
        <button id="download-log" type="button" class="btn btn--secondary">
          Download log
        </button>
        <button id="clear-log" type="button" class="btn btn--secondary">
          Clear log
        </button>
        <button id="clear-cache" type="button" class="btn btn--primary">
          Clear Vivino cache
        </button>
        <p id="feedback" class="feedback" hidden></p>
      </div>
    </details>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
